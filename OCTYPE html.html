<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Always Online</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --text: #e0e0e0;
            --gold: #d4a574;
            --gold-light: #f0d6b8;
            --accent: #ff6b8a;
            --bubble-bg: rgba(255, 255, 255, 0.92);
            --bubble-text: #2c2c2c;
            --chest-brown: #6b3a2a;
            --chest-dark: #4a2215;
            --key-gold: #e8c170;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        /* 星空背景 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.8);
            }
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: all 0.6s ease;
        }

        /* 标题 */
        .main-title {
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            letter-spacing: 0.06em;
            text-shadow: 0 0 40px rgba(200, 180, 255, 0.6), 0 0 80px rgba(180, 160, 255, 0.35), 0 0 120px rgba(255, 180, 200, 0.3);
            animation: titleGlow 3s ease-in-out infinite;
            line-height: 1.3;
        }
        @keyframes titleGlow {
            0%,
            100% {
                text-shadow: 0 0 40px rgba(200, 180, 255, 0.6), 0 0 80px rgba(180, 160, 255, 0.35), 0 0 120px rgba(255, 180, 200, 0.3);
            }
            50% {
                text-shadow: 0 0 55px rgba(220, 200, 255, 0.85), 0 0 100px rgba(200, 180, 255, 0.55), 0 0 150px rgba(255, 200, 220, 0.5);
            }
        }

        /* 启动按钮 */
        .start-btn {
            position: relative;
            padding: 14px 48px;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #fff;
            background: linear-gradient(135deg, #6b5ce7, #a855f7, #d946ef);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            outline: none;
            transition: all 0.35s ease;
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.45), 0 0 60px rgba(168, 85, 247, 0.25);
            z-index: 1;
            animation: btnPulse 2.5s ease-in-out infinite;
        }
        .start-btn:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 14px 40px rgba(139, 92, 246, 0.6), 0 0 80px rgba(168, 85, 247, 0.4);
        }
        .start-btn:active {
            transform: scale(0.96);
            transition: all 0.1s ease;
        }
        @keyframes btnPulse {
            0%,
            100% {
                box-shadow: 0 8px 30px rgba(139, 92, 246, 0.45), 0 0 60px rgba(168, 85, 247, 0.25);
            }
            50% {
                box-shadow: 0 10px 38px rgba(139, 92, 246, 0.7), 0 0 90px rgba(200, 120, 255, 0.5);
            }
        }
        .start-btn.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
            transition: all 0.5s ease;
        }
        .main-title.fade-out {
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        /* 问题弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-dialog {
            background: #1e1e35;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 32px 28px 24px;
            width: min(90vw, 420px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 80px rgba(139, 92, 246, 0.2);
            animation: slideUp 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            position: relative;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-dialog.shake {
            animation: shake 0.5s ease;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-12px);
            }
            40% {
                transform: translateX(12px);
            }
            60% {
                transform: translateX(-8px);
            }
            80% {
                transform: translateX(6px);
            }
        }
        .modal-question-number {
            font-size: 0.85rem;
            color: #a78bfa;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }
        .modal-question {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0e6ff;
            margin-bottom: 6px;
            line-height: 1.5;
        }
        .modal-hint {
            font-size: 0.85rem;
            color: #b0a0d0;
            margin-bottom: 18px;
            font-style: italic;
        }
        .modal-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            outline: none;
            text-align: center;
            letter-spacing: 0.04em;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .modal-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }
        .modal-input.error {
            border-color: #ff4757;
            animation: inputError 0.4s ease;
        }
        @keyframes inputError {
            0%,
            100% {
                border-color: #ff4757;
            }
            50% {
                border-color: #ff6b81;
            }
        }
        .modal-submit-btn {
            margin-top: 16px;
            padding: 10px 36px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #fff;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }
        .modal-submit-btn:hover {
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }
        .modal-error-msg {
            color: #ff6b81;
            font-size: 0.85rem;
            margin-top: 8px;
            min-height: 20px;
            transition: all 0.3s ease;
        }

        /* 宝箱动画覆盖层 */
        .chest-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
        }
        .chest-scene {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 宝箱 */
        .chest-body {
            position: absolute;
            bottom: 30px;
            width: 130px;
            height: 85px;
            background: linear-gradient(180deg, #8b5e3c 0%, #5c3320 100%);
            border-radius: 6px 6px 14px 14px;
            border: 3px solid #a0724a;
            box-shadow: inset 0 -8px 20px rgba(0, 0, 0, 0.4), 0 8px 25px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }
        .chest-body::after {
            content: '';
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 28px;
            background: radial-gradient(circle, #e8c170 30%, #b8903a 100%);
            border-radius: 50%;
            border: 2.5px solid #c9a050;
            box-shadow: 0 0 15px rgba(232, 193, 112, 0.6);
            z-index: 5;
        }
        .chest-lid {
            position: absolute;
            bottom: 112px;
            width: 138px;
            height: 50px;
            background: linear-gradient(180deg, #a0724a 0%, #7a4628 100%);
            border-radius: 14px 14px 4px 4px;
            border: 3px solid #b8835a;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.4), 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 3;
            transform-origin: bottom center;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .chest-lid.open {
            transform: rotateX(-115deg);
        }
        /* 钥匙 */
        .key-container {
            position: absolute;
            z-index: 10;
            animation: keyDescend 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation-play-state: paused;
        }
        .key-container.animate {
            animation-play-state: running;
        }
        @keyframes keyDescend {
            0% {
                top: -60px;
                transform: rotate(-30deg);
                opacity: 0;
            }
            40% {
                top: 55px;
                transform: rotate(10deg);
                opacity: 1;
            }
            65% {
                top: 62px;
                transform: rotate(-5deg);
                opacity: 1;
            }
            80% {
                top: 58px;
                transform: rotate(3deg);
                opacity: 1;
            }
            100% {
                top: 60px;
                transform: rotate(0deg);
                opacity: 1;
            }
        }
        .key-svg {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 12px rgba(232, 193, 112, 0.7));
        }
        /* 光芒 */
        .chest-glow {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff8dc 0%, #ffd700 40%, transparent 70%);
            z-index: 1;
            opacity: 0;
            transition: all 0.6s ease;
            pointer-events: none;
        }
        .chest-glow.active {
            opacity: 1;
            width: 250px;
            height: 250px;
            box-shadow: 0 0 100px 40px rgba(255, 215, 0, 0.7), 0 0 200px 80px rgba(255, 200, 50, 0.5), 0 0 300px 120px rgba(255, 180, 30, 0.35);
            transition: all 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .chest-label {
            color: #ffd700;
            font-size: 1rem;
            letter-spacing: 0.1em;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: center;
            font-weight: 500;
        }
        .chest-label.visible {
            opacity: 1;
        }

        /* 弹幕容器 */
        .danmaku-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        .danmaku-bubble {
            position: absolute;
            display: inline-block;
            padding: 10px 18px;
            background: var(--bubble-bg);
            color: var(--bubble-text);
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            white-space: nowrap;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18), 0 1px 4px rgba(0, 0, 0, 0.1);
            animation: danmakuMove var(--speed) linear forwards;
            z-index: 51;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            position: relative;
        }
        .danmaku-bubble::after {
            content: '';
            position: absolute;
            right: -7px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 9px solid var(--bubble-bg);
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }
        .danmaku-bubble:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25), 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 55;
        }
        .danmaku-bubble:active {
            transform: scale(0.95);
            transition: transform 0.08s ease;
        }
        @keyframes danmakuMove {
            from {
                transform: translateX(105vw);
            }
            to {
                transform: translateX(-120%);
            }
        }

        /* 爱心特效 */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 300;
            font-size: 1.5rem;
            animation: heartFloat 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            filter: drop-shadow(0 2px 6px rgba(255, 100, 130, 0.5));
        }
        @keyframes heartFloat {
            0% {
                transform: translateY(0) scale(0.4);
                opacity: 1;
            }
            40% {
                transform: translateY(-50px) scale(1.3);
                opacity: 0.9;
            }
            100% {
                transform: translateY(-180px) scale(0.7);
                opacity: 0;
            }
        }

        /* 最终文字 */
        .final-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: 0.08em;
            color: #fff;
            text-align: center;
            z-index: 250;
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 50px rgba(255, 180, 200, 0.9), 0 0 100px rgba(255, 150, 180, 0.6), 0 0 180px rgba(255, 200, 150, 0.5);
            pointer-events: none;
            line-height: 1.4;
        }
        .final-message.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .final-sparkles {
            position: fixed;
            pointer-events: none;
            z-index: 249;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkleBurst 2s ease-out forwards;
            animation-delay: var(--sdelay);
        }
        @keyframes sparkleBurst {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--sx), var(--sy)) scale(0);
                opacity: 0;
            }
        }

        /* 音频提示 */
        .audio-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.55);
            color: #ccc;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            pointer-events: auto;
        }
        .audio-hint:hover {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.5);
        }
        .audio-hint.playing {
            border-color: #a78bfa;
            color: #c4b5fd;
            animation: audioPulse 2s ease-in-out infinite;
        }
        @keyframes audioPulse {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(139, 92, 246, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(139, 92, 246, 0.7);
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .danmaku-bubble {
                font-size: 0.78rem;
                padding: 8px 14px;
                border-radius: 16px;
            }
            .danmaku-bubble::after {
                right: -5px;
                border-left-width: 7px;
                border-top-width: 5px;
                border-bottom-width: 5px;
            }
            .modal-dialog {
                padding: 24px 18px 18px;
                border-radius: 16px;
            }
            .chest-body {
                width: 100px;
                height: 65px;
            }
            .chest-lid {
                width: 106px;
                height: 38px;
                bottom: 92px;
            }
            .key-svg {
                width: 38px;
                height: 38px;
            }
            .chest-scene {
                width: 150px;
                height: 160px;
            }
        }
    </style>
</head>
<body>

    <!-- 星空背景 -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- 主容器 -->
    <div class="main-container" id="mainContainer">
        <h1 class="main-title" id="mainTitle">I'm always online</h1>
        <button class="start-btn" id="startBtn" title="点击开启旅程">✦ 启 动 ✦</button>
    </div>

    <!-- 问题弹窗（动态创建） -->
    <div id="modalContainer"></div>

    <!-- 宝箱动画覆盖层（动态创建） -->
    <div id="chestOverlayContainer"></div>

    <!-- 弹幕容器 -->
    <div class="danmaku-container" id="danmakuContainer"></div>

    <!-- 爱心特效容器 -->
    <div id="heartsContainer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:300;"></div>

    <!-- 最终文字 -->
    <div class="final-message" id="finalMessage">LYL天天开心</div>

    <!-- 最终烟花粒子 -->
    <div class="final-sparkles" id="finalSparkles"></div>

    <!-- 音频元素 -->
    <audio id="bgmAudio" preload="auto" loop style="display:none;">
        <!--
            请将林俊杰《Always Online》的音频文件放在同目录下，
            命名为 always_online.mp3，或修改下方src为有效URL
        -->
        <source src="always_online.mp3" type="audio/mpeg">
        <source src="https://music.163.com/song/media/outer/url?id=108914.mp3" type="audio/mpeg">
    </audio>

    <!-- 音频状态提示 -->
    <div class="audio-hint" id="audioHint" title="点击尝试播放音乐"> 音乐待机</div>

    <script>
        (function() {
            // ==================== 星空背景 ====================
            const starsContainer = document.getElementById('starsContainer');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 2.5 + 0.8;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', (Math.random() * 4) + 's');
                starsContainer.appendChild(star);
            }

            // ==================== 音频管理 ====================
            const bgmAudio = document.getElementById('bgmAudio');
            const audioHint = document.getElementById('audioHint');
            let audioInitialized = false;
            let audioPlaying = false;

            function tryInitAudio() {
                if (audioInitialized) return;
                audioInitialized = true;
                bgmAudio.volume = 0.45;
                const playPromise = bgmAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        audioPlaying = true;
                        audioHint.textContent = '♪ 音乐播放中';
                        audioHint.classList.add('playing');
                    }).catch(() => {
                        audioPlaying = false;
                        audioHint.textContent = ' 点击此处播放音乐';
                        audioHint.classList.remove('playing');
                    });
                }
            }

            function ensureAudioPlay() {
                if (audioPlaying) return;
                bgmAudio.volume = 0.45;
                const playPromise = bgmAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        audioPlaying = true;
                        audioHint.textContent = '♪ 音乐播放中';
                        audioHint.classList.add('playing');
                    }).catch(() => {
                        audioPlaying = false;
                        audioHint.textContent = ' 点击此处播放音乐';
                        audioHint.classList.remove('playing');
                    });
                }
            }

            audioHint.addEventListener('click', () => {
                ensureAudioPlay();
                if (!audioPlaying) {
                    audioHint.textContent = '⚠ 音频加载中，请检查网络或文件';
                    setTimeout(() => {
                        if (!audioPlaying) audioHint.textContent = ' 音乐待机（点击重试）';
                    }, 3000);
                }
            });

            bgmAudio.addEventListener('playing', () => {
                audioPlaying = true;
                audioHint.textContent = '♪ 音乐播放中';
                audioHint.classList.add('playing');
            });
            bgmAudio.addEventListener('pause', () => {
                if (!bgmAudio.ended && audioPlaying && bgmAudio.currentTime > 0) {
                    audioPlaying = false;
                    audioHint.textContent = ' 音乐已暂停';
                    audioHint.classList.remove('playing');
                }
            });
            bgmAudio.addEventListener('error', () => {
                audioPlaying = false;
                audioHint.textContent = '⚠ 音频加载失败，请检查文件';
                audioHint.classList.remove('playing');
            });

            // ==================== DOM元素 ====================
            const mainContainer = document.getElementById('mainContainer');
            const mainTitle = document.getElementById('mainTitle');
            const startBtn = document.getElementById('startBtn');
            const modalContainer = document.getElementById('modalContainer');
            const chestOverlayContainer = document.getElementById('chestOverlayContainer');
            const danmakuContainer = document.getElementById('danmakuContainer');
            const heartsContainer = document.getElementById('heartsContainer');
            const finalMessage = document.getElementById('finalMessage');
            const finalSparkles = document.getElementById('finalSparkles');

            // ==================== 问题数据 ====================
            const questions = [{
                id: 1,
                question: '我为什么是这个姓名？',
                hint: '提示：一句诗，七个字',
                answer: '落花时节又逢君',
                answerNormalized: '落花时节又逢君'
            }, {
                id: 2,
                question: '我最喜欢的歌手是谁？',
                hint: '',
                answer: '许嵩',
                answerNormalized: '许嵩'
            }, {
                id: 3,
                question: '长大以后我想当什么？',
                hint: '',
                answer: '律师',
                answerNormalized: '律师'
            }, {
                id: 4,
                question: '我最好的朋友是谁？',
                hint: '',
                answer: '吕玥霖',
                answerNormalized: '吕玥霖'
            }];

            let currentQuestionIndex = 0;
            let allAnswered = false;

            // ==================== 启动按钮 ====================
            startBtn.addEventListener('click', () => {
                tryInitAudio();
                startBtn.classList.add('hidden');
                mainTitle.classList.add('fade-out');
                setTimeout(() => {
                    mainTitle.style.display = 'none';
                    showQuestion(0);
                }, 500);
            });

            // ==================== 问题弹窗 ====================
            function showQuestion(index) {
                if (index >= questions.length) {
                    allAnswered = true;
                    closeAllModals();
                    showChestAnimation();
                    return;
                }
                currentQuestionIndex = index;
                const q = questions[index];
                const overlay = document.createElement('div');
                overlay.classList.add('modal-overlay');
                overlay.id = 'modalOverlay-' + index;
                overlay.innerHTML = `
                    <div class="modal-dialog" id="modalDialog-${index}">
                        <div class="modal-question-number">问题 ${q.id} / ${questions.length}</div>
                        <div class="modal-question">${q.question}</div>
                        ${q.hint ? `<div class="modal-hint">${q.hint}</div>` : ''}
                        <input type="text" class="modal-input" id="modalInput-${index}" placeholder="请输入答案..." autocomplete="off">
                        <button class="modal-submit-btn" id="modalSubmit-${index}">确 认</button>
                        <div class="modal-error-msg" id="modalError-${index}"></div>
                    </div>
                `;
                modalContainer.appendChild(overlay);

                const input = document.getElementById('modalInput-' + index);
                const submitBtn = document.getElementById('modalSubmit-' + index);
                const dialog = document.getElementById('modalDialog-' + index);
                const errorMsg = document.getElementById('modalError-' + index);

                setTimeout(() => input.focus(), 350);

                function checkAnswer() {
                    const userAnswer = input.value.trim();
                    const correctAnswer = q.answerNormalized;
                    if (userAnswer === correctAnswer) {
                        /// 正确（修复版）
input.style.borderColor = '#4ade80';
input.style.boxShadow = '0 0 20px rgba(74,222,128,0.4)';
submitBtn.style.background = 'linear-gradient(135deg, #22c55e, #4ade80)';
errorMsg.textContent = '✓ 回答正确！';
errorMsg.style.color = '#4ade80';
submitBtn.disabled = true;
input.disabled = true;

// 延迟执行淡出
setTimeout(() => {
    overlay.style.animation = 'fadeIn 0.3s ease reverse';
    
    function goNext() {
        if (overlay.parentNode) {
            overlay.remove();
        }
        showQuestion(index + 1);
    }
    
    // 主监听：动画自然结束
    const onAnimationEnd = function handler() {
        overlay.removeEventListener('animationend', onAnimationEnd);
        goNext();
    };
    overlay.addEventListener('animationend', onAnimationEnd);
    
    // 兜底：万一动画没触发，350ms后强制跳转
    setTimeout(goNext, 380);
}, 600);
                    } else {
                        // 错误
                        input.classList.add('error');
                        dialog.classList.add('shake');
                        errorMsg.textContent = '✗ 答案不正确，请再试一次~';
                        errorMsg.style.color = '#ff6b81';
                        setTimeout(() => {
                            input.classList.remove('error');
                            dialog.classList.remove('shake');
                        }, 500);
                        input.focus();
                        input.select();
                    }
                }

                submitBtn.addEventListener('click', checkAnswer);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        checkAnswer();
                    }
                });

                // 点击覆盖层空白处不关闭（强制回答）
            }

            function closeAllModals() {
                modalContainer.innerHTML = '';
            }

            // ==================== 宝箱动画 ====================
            function showChestAnimation() {
                ensureAudioPlay();
                const overlay = document.createElement('div');
                overlay.classList.add('chest-overlay');
                overlay.id = 'chestOverlay';
                overlay.innerHTML = `
                    <div class="chest-scene">
                        <div class="chest-glow" id="chestGlow"></div>
                        <div class="chest-lid" id="chestLid"></div>
                        <div class="chest-body"></div>
                        <div class="key-container" id="keyContainer">
                            <svg class="key-svg" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="18" cy="14" r="9" fill="none" stroke="#e8c170" stroke-width="4.5" stroke-linecap="round"/>
                                <rect x="15" y="20" width="6" height="18" rx="2" fill="#e8c170"/>
                                <rect x="16.5" y="34" width="3" height="10" rx="1.2" fill="#e8c170"/>
                                <rect x="14" y="36" width="8" height="3" rx="1" fill="#d4a040"/>
                            </svg>
                        </div>
                    </div>
                    <div class="chest-label" id="chestLabel"> 正在开启宝箱...</div>
                `;
                chestOverlayContainer.appendChild(overlay);

                const keyContainer = document.getElementById('keyContainer');
                const chestLid = document.getElementById('chestLid');
                const chestGlow = document.getElementById('chestGlow');
                const chestLabel = document.getElementById('chestLabel');

                // 动画序列
                setTimeout(() => {
                    keyContainer.classList.add('animate');
                    chestLabel.classList.add('visible');
                    chestLabel.textContent = ' 正在开启宝箱...';
                }, 200);

                setTimeout(() => {
                    chestLid.classList.add('open');
                    chestLabel.textContent = '✨ 宝箱开启了！';
                }, 1100);

                setTimeout(() => {
                    chestGlow.classList.add('active');
                    chestLabel.textContent = ' 惊喜正在路上...';
                }, 1700);

                // 过渡到弹幕
                setTimeout(() => {
                    overlay.style.animation = 'fadeIn 0.5s ease reverse';
                    overlay.addEventListener('animationend', function handler() {
                        overlay.removeEventListener('animationend', handler);
                        overlay.remove();
                        startDanmaku();
                    });
                    setTimeout(() => {
                        if (overlay.parentNode) overlay.remove();
                        startDanmaku();
                    }, 550);
                }, 2800);
            }

            // ==================== 弹幕系统 ====================
            // 真实歌词（来自林俊杰《Always Online》及其他正能量歌曲）
            const realLyrics = [
                '准备好了 和你一起 就是现在',
                '爱亮了 爱笑了 I\'m always online',
                '世界变化太快 还好有你在',
                '不用任何言语 就能感受彼此的存在',
                '摊开掌心 就能找到彼此',
                '不管距离多远 心都在身边',
                '我想就这样牵着你的手不放开',
                '怎么去拥有一道彩虹 怎么去拥抱一夏天的风',
                '陪你把沿路感想活出了答案',
                '你知道就算大雨让这座城市颠倒 我会给你怀抱',
                '小酒窝长睫毛 是你最美的记号',
                '逆风的方向 更适合飞翔',
                '这是一首简单的小情歌',
                '我的宝贝宝贝 给你一点甜甜',
                '我遇见谁会有怎样的对白',
                '我想说其实你很好 你自己却不知道',
                '故事的小黄花 从出生那年就飘着',
                '原来你是我最想留住的幸运',
                '明天会更好 轻轻敲醒沉睡的心灵',
                '岁月是一场有去无回的旅行 好的坏的都是风景',
                '陪你把想念的酸拥抱成温暖',
                '你是我最初和最后的天堂',
                '世间美好与你环环相扣',
                '此时已莺飞草长 爱的人正在路上',
                '我知他风雨兼程 途经日暮不赏',
                '穿越人海 只为与你相拥',
                '愿世间所有美好 都与你环环相扣',
            ];

            // 文艺文案库
            const literaryTexts = [
                '世界很大，幸好有你',
                '所有的相遇，都是久别重逢',
                '愿你被这个世界温柔以待',
                '岁月漫长，然而值得等待',
                '山野万里的风，终究会吹到你身边',
                '星河滚烫，你是人间理想',
                '万物皆有裂痕，那是光照进来的地方',
                '愿你所遇皆温柔，所行皆坦途',
                '且将新火试新茶，诗酒趁年华',
                '人间有味是清欢',
                '生活明朗，万物可爱',
                '来日方长，未来可期',
                '心之所向，素履以往',
                '陌上花开，可缓缓归矣',
                '春风十里，不如你',
                '行至水穷处，坐看云起时',
                '此心安处是吾乡',
                '愿有岁月可回首，且以深情共白头',
                '一花一世界，一叶一菩提',
                '世间所有的相遇都是久别重逢',
                '你是我漫长岁月里的惊喜',
                '阳光正好，微风不燥',
                '保持热爱，奔赴山海',
                '前路漫漫亦灿灿',
                '愿你历经千帆，归来仍是少年',
                '星光不问赶路人，时光不负有心人',
                '一切都是最好的安排',
                '心怀浪漫宇宙，也惜人间日常',
            ];

            // 合并弹幕内容池
            const danmakuPool = [...realLyrics, ...literaryTexts];

            let danmakuActive = false;
            let danmakuTimer = null;
            let danmakuGenerationDuration = 22000; // 生成弹幕持续22秒
            let danmakuCheckInterval = null;
            let allDanmakuElements = new Set();

            function getRandomDanmakuContent() {
                return danmakuPool[Math.floor(Math.random() * danmakuPool.length)];
            }

            function createDanmakuBubble() {
                if (!danmakuActive) return;

                const bubble = document.createElement('div');
                bubble.classList.add('danmaku-bubble');
                bubble.textContent = getRandomDanmakuContent();

                // 随机垂直位置（避免太靠边缘）
                const topPercent = Math.random() * 78 + 8;
                bubble.style.top = topPercent + '%';

                // 随机速度
                const speed = Math.random() * 6 + 7; // 7-13秒穿过屏幕
                bubble.style.setProperty('--speed', speed + 's');

                // 随机初始延迟（错开）
                const initDelay = Math.random() * 1.5;
                bubble.style.animationDelay = initDelay + 's';

                // 随机大小微调
                const scale = Math.random() * 0.25 + 0.88;
                bubble.style.fontSize = (0.95 * scale) + 'rem';
                bubble.style.padding = (10 * scale) + 'px ' + (18 * scale) + 'px';

                bubble.addEventListener('click', function(e) {
                    e.stopPropagation();
                    spawnHearts(e.clientX, e.clientY);
                });

                danmakuContainer.appendChild(bubble);
                allDanmakuElements.add(bubble);

                // 动画结束后移除
                const totalDuration = (speed + initDelay) * 1000;
                setTimeout(() => {
                    if (bubble.parentNode) {
                        bubble.remove();
                        allDanmakuElements.delete(bubble);
                    }
                }, totalDuration + 300);
            }

            function spawnHearts(x, y) {
                const heartEmojis = ['❤️', '', '', '', '', '', '', '🩷', '✨', ''];
                const count = Math.floor(Math.random() * 4) + 3; // 3-6个爱心
                for (let i = 0; i < count; i++) {
                    const heart = document.createElement('span');
                    heart.classList.add('heart-particle');
                    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                    heart.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
                    heart.style.top = (y + (Math.random() - 0.5) * 30) + 'px';
                    heart.style.fontSize = (Math.random() * 1.2 + 1.2) + 'rem';
                    heart.style.animationDuration = (Math.random() * 0.8 + 1.1) + 's';
                    heartsContainer.appendChild(heart);
                    setTimeout(() => {
                        if (heart.parentNode) heart.remove();
                    }, 1800);
                }
            }

            function startDanmaku() {
                danmakuActive = true;
                allDanmakuElements.clear();
                danmakuContainer.innerHTML = '';

                // 初始快速生成一批弹幕
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => createDanmakuBubble(), i * 180);
                }

                // 持续生成弹幕
                danmakuTimer = setInterval(() => {
                    if (!danmakuActive) {
                        clearInterval(danmakuTimer);
                        return;
                    }
                    const count = Math.floor(Math.random() * 2) + 1; // 每次1-2条
                    for (let i = 0; i < count; i++) {
                        createDanmakuBubble();
                    }
                }, 550);

                // 设定生成弹幕的持续时间
                setTimeout(() => {
                    danmakuActive = false;
                    clearInterval(danmakuTimer);
                    // 等待所有弹幕飘出屏幕
                    checkAllDanmakuCleared();
                }, danmakuGenerationDuration);
            }

            function checkAllDanmakuCleared() {
                danmakuCheckInterval = setInterval(() => {
                    if (allDanmakuElements.size === 0 && danmakuContainer.children.length === 0) {
                        clearInterval(danmakuCheckInterval);
                        showFinalMessage();
                    }
                }, 800);
                // 安全兜底：最多等15秒
                setTimeout(() => {
                    if (danmakuCheckInterval) {
                        clearInterval(danmakuCheckInterval);
                        showFinalMessage();
                    }
                }, 15000);
            }

            // ==================== 最终文字 ====================
            function showFinalMessage() {
                // 生成烟花粒子
                const sparklesContainer = document.getElementById('finalSparkles');
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                for (let i = 0; i < 80; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('sparkle');
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 280 + 60;
                    sparkle.style.left = cx + 'px';
                    sparkle.style.top = cy + 'px';
                    sparkle.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
                    sparkle.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
                    sparkle.style.setProperty('--sdelay', Math.random() * 0.8 + 's');
                    sparkle.style.width = (Math.random() * 5 + 2) + 'px';
                    sparkle.style.height = sparkle.style.width;
                    sparkle.style.background = ['#ffd700', '#ffb3d9', '#ff9ecf', '#ffc8a0', '#a0e7ff', '#d4b8ff'][
                        Math.floor(Math.random() * 6)
                    ];
                    sparklesContainer.appendChild(sparkle);
                    setTimeout(() => {
                        if (sparkle.parentNode) sparkle.remove();
                    }, 2500);
                }

                // 显示最终文字
                finalMessage.classList.add('show');

                // 额外的爱心雨
                const finalHeartInterval = setInterval(() => {
                    const rx = Math.random() * window.innerWidth;
                    const ry = Math.random() * window.innerHeight * 0.5;
                    spawnHearts(rx, ry);
                }, 300);

                setTimeout(() => {
                    clearInterval(finalHeartInterval);
                }, 4000);

                // 确保音乐在播放
                ensureAudioPlay();
            }

            // ==================== 全局点击爱心（弹幕容器外的备用） ====================
            document.addEventListener('click', function(e) {
                // 如果点击的是弹幕气泡，由气泡自己的处理器处理
                if (e.target.closest('.danmaku-bubble')) return;
                // 如果点击的是音频提示或按钮等交互元素，不生成爱心
                if (e.target.closest('button') || e.target.closest('input') || e.target.closest('#audioHint'))
                    return;
                // 在弹幕活跃期间或之后，随机在点击处生成少量爱心
                if (danmakuActive || finalMessage.classList.contains('show')) {
                    if (Math.random() < 0.5) {
                        spawnHearts(e.clientX, e.clientY);
                    }
                }
            });

            // ==================== 键盘快捷键 ====================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && allAnswered === false && currentQuestionIndex < questions.length) {
                    // 不关闭弹窗，用户必须回答问题
                }
            });

            // ==================== 初始化日志 ====================
            console.log(' 欢迎来到 "I\'m Always Online" 互动页面');
            console.log(' 点击启动按钮开始旅程吧！');
            console.log(' 配乐：林俊杰 - Always Online');
            console.log(' 请确保音频文件 always_online.mp3 存在于同目录下，或修改HTML中的音频源URL');
            console.log(' 弹幕中的气泡框可以点击生成爱心哦~');

            // ==================== 窗口大小变化时清理 ====================
            window.addEventListener('resize', () => {
                // 更新星空
                starsContainer.querySelectorAll('.star').forEach(s => {
                    s.style.left = Math.random() * 100 + '%';
                    s.style.top = Math.random() * 100 + '%';
                });
            });

            // ==================== 页面卸载清理 ====================
            window.addEventListener('beforeunload', () => {
                if (danmakuTimer) clearInterval(danmakuTimer);
                if (danmakuCheckInterval) clearInterval(danmakuCheckInterval);
                bgmAudio.pause();
            });

        })();
    </script>
