<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LYL今天吃什么？</title>
    <!-- PWA 支持，可添加到主屏幕变 APP -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'></text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FFE4E1;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }
        .bg-decor { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .decor { position: absolute; font-size: 28px; opacity: 0.7; animation: float 4s ease-in-out infinite; }
        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .container {
            position: relative; z-index:1; width: 90vw; max-width: 420px;
            background: rgba(255, 240, 245, 0.9); backdrop-filter: blur(10px);
            border-radius: 30px; box-shadow: 0 10px 30px rgba(255,105,180,0.3);
            padding: 20px 15px 30px; display: flex; flex-direction: column; align-items: center;
            border: 2px solid #FFB6C1;
        }
        .title {
            font-size: 2em; font-weight: bold; color: #FF69B4;
            text-shadow: 2px 2px 0 #FFF0F5; margin: 10px 0; text-align: center;
            letter-spacing: 2px; padding-left: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><text y="15" font-size="20" fill="%23FFB6C1"></text></svg>') left center no-repeat;
        }
        .machine {
            position: relative; width: 280px; height: 320px;
            background: #FFB6C1; border-radius: 25px; margin: 15px 0;
            box-shadow: inset 0 -5px 0 #FF69B4, 0 8px 15px rgba(255,105,180,0.4);
            border: 3px solid #FF69B4;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .machine::before { content: ""; position: absolute; top:8px; left:15px; font-size:25px; transform: rotate(-15deg); }
        .machine::after { content: ""; position: absolute; top:8px; right:15px; font-size:25px; transform: rotate(15deg); }
        .eggs-container {
            position: relative; width: 100%; height: 150px;
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding: 10px;
        }
        .egg {
            width: 50px; height: 55px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2), inset 0 -3px 0 rgba(0,0,0,0.1);
            transition: all 0.5s ease; position: relative;
            background: radial-gradient(circle at 30% 30%, #fff, #FFD700);
        }
        .egg:nth-child(odd) { background: radial-gradient(circle at 30% 30%, #fff, #FFA07A); }
        .egg:nth-child(3n) { background: radial-gradient(circle at 30% 30%, #fff, #DDA0DD); }
        .egg:nth-child(4n) { background: radial-gradient(circle at 30% 30%, #fff, #87CEEB); }
        .egg::after { content: "✨"; position: absolute; top:5px; left:8px; font-size:14px; opacity:0.8; }
        .claw {
            position: absolute; left: 50%; top: -40px; transform: translateX(-50%);
            z-index: 5; transition: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            width: 40px; height: 60px;
        }
        .claw svg { width: 100%; height: 100%; }
        .btn {
            background: #FF69B4; border: none; color: white; font-size: 1.3em; font-weight: bold;
            padding: 12px 30px; border-radius: 50px;
            box-shadow: 0 5px 0 #DB7093, 0 8px 15px rgba(255,105,180,0.5);
            cursor: pointer; margin: 10px 0; letter-spacing: 3px;
            display: flex; align-items: center; gap: 8px;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #DB7093, 0 5px 10px rgba(255,105,180,0.5); }
        .btn:disabled { opacity: 0.6; transform: translateY(3px); box-shadow: 0 3px 0 #DB7093; pointer-events: none; }
        .note {
            position: relative; background: #FFFACD; border: 2px solid #FFB6C1; border-radius: 15px;
            padding: 15px 20px; margin-top: 15px; font-size: 1.2em; color: #FF69B4;
            font-weight: bold; text-align: center; box-shadow: 0 5px 10px rgba(255,105,180,0.3);
            animation: popIn 0.4s ease; max-width: 250px;
            display: none; align-items: center; justify-content: center; flex-direction: column;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .note.show { display: flex; }
        .note .close-btn {
            position: absolute; top: -10px; right: -10px; background: #FF69B4; color: white;
            border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center;
            justify-content: center; font-size: 14px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .hint { color: #FF69B4; font-size: 0.9em; margin-top: 10px; text-align: center; }
        .footer { margin-top: 20px; font-size: 0.8em; color: #DB7093; }
        @keyframes rainbow {
            0% { color: #FF69B4; } 25% { color: #FFA500; } 50% { color: #32CD32; } 75% { color: #1E90FF; } 100% { color: #FF69B4; }
        }
        .special { animation: rainbow 1s infinite; font-size: 1.2em; }
        /* 音乐提示 */
        .music-tip { font-size: 0.7em; color: #999; margin-top: 5px; }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decor" id="bgDecor"></div>

    <div class="container">
        <div class="title"> LYL今天吃什么？</div>

        <div class="machine" id="machine">
            <div class="eggs-container" id="eggsContainer"></div>
            <div class="claw" id="claw">
                <!-- SVG 金属吊爪 -->
                <svg viewBox="0 0 40 60">
                    <!-- 悬挂杆 -->
                    <rect x="17" y="0" width="6" height="20" fill="#B0C4DE" rx="2"/>
                    <!-- 中心轴 -->
                    <circle cx="20" cy="22" r="5" fill="#708090"/>
                    <!-- 三个夹爪 -->
                    <path d="M8,28 Q20,40 12,50" stroke="#778899" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M20,28 L20,50" stroke="#778899" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M32,28 Q20,40 28,50" stroke="#778899" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <!-- 夹子尖端小圆 -->
                    <circle cx="12" cy="50" r="2" fill="#A9A9A9"/>
                    <circle cx="20" cy="50" r="2" fill="#A9A9A9"/>
                    <circle cx="28" cy="50" r="2" fill="#A9A9A9"/>
                </svg>
            </div>
        </div>

        <button class="btn" id="grabBtn"> 抓 取 </button>
        
        <div class="note" id="note">
            <span id="noteText"></span>
            <span class="close-btn" id="closeNote">✕</span>
        </div>
        
        <div class="hint">点按钮，爪子就会抓个扭蛋哦～</div>
        <div class="footer"> 彩蛋隐藏其中 </div>
        <div class="music-tip"> 将「有何不可.mp3」放在同目录下自动播放</div>
    </div>

    <audio id="bgm" loop autoplay>
        <source src="有何不可.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ==================== 菜单数据 ====================
        const menuItems = [
            "珍珠奶茶", "杨枝甘露", "芋泥波波", "冰拿铁", "热可可", "抹茶冰淇淋", "草莓蛋糕",
            "蛋包饭", "寿司拼盘", "章鱼小丸子", "铜锣烧", "焦糖布丁", "咖喱蛋包饭", "豚骨拉面",
            "三明治", "水果沙拉", "可丽饼", "鲷鱼烧", "芝士年糕", "提拉米苏",
            "麻辣烫", "黄焖鸡米饭", "糖醋里脊", "宫保鸡丁", "番茄炒蛋", "回锅肉", "水煮鱼",
            "重庆小面", "兰州拉面", "煎饼果子", "肉夹馍", "凉皮", "螺蛳粉", "热干面",
            "披萨", "意大利面", "汉堡", "薯条", "炸鸡", "寿司", "石锅拌饭", "韩式炸鸡",
            "越南河粉", "冬阴功汤", "海南鸡饭", "烤鸭", "小笼包", "馄饨", "酸辣粉",
            "奶茶三兄弟", "芝士葡萄", "满杯红柚", "冰淇淋红茶", "烧仙草", "双皮奶"
        ];
        const specialItem = "打电话给sfj，跟她说1996";
        const specialProb = 0.05;

        // ==================== 音效合成 ====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(freq, type, duration, vol=0.2) {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        function grabSound() { playSound(800, 'square', 0.1, 0.3); playSound(400, 'triangle', 0.15, 0.2); }
        function dropSound() { playSound(200, 'triangle', 0.2, 0.3); playSound(80, 'sine', 0.3, 0.4); }
        function specialSound() { playSound(1200, 'square', 0.05, 0.2); setTimeout(()=>playSound(1600,'square',0.05,0.2),150); }

        // ==================== 初始化扭蛋 ====================
        const eggColors = ['#FFD700', '#FFA07A', '#DDA0DD', '#87CEEB', '#FFB6C1', '#98FB98'];
        const eggsContainer = document.getElementById('eggsContainer');
        const eggElements = [];
        for (let i = 0; i < 6; i++) {
            const egg = document.createElement('div');
            egg.className = 'egg';
            egg.style.background = `radial-gradient(circle at 30% 30%, #fff, ${eggColors[i % eggColors.length]})`;
            egg.dataset.index = i;
            eggsContainer.appendChild(egg);
            eggElements.push(egg);
        }

        const claw = document.getElementById('claw');
        const machine = document.getElementById('machine');
        const grabBtn = document.getElementById('grabBtn');
        const note = document.getElementById('note');
        const noteText = document.getElementById('noteText');
        const closeNote = document.getElementById('closeNote');
        const bgm = document.getElementById('bgm');

        // 尝试播放背景音乐（需用户交互）
        document.addEventListener('touchstart', () => { if (bgm.paused) bgm.play().catch(()=>{}); }, {once: true});
        document.addEventListener('click', () => { if (bgm.paused) bgm.play().catch(()=>{}); }, {once: true});

        let isAnimating = false;
        closeNote.addEventListener('click', () => note.classList.remove('show'));

        function getResult() {
            return Math.random() < specialProb ? specialItem : menuItems[Math.floor(Math.random() * menuItems.length)];
        }

        function animateGrab(targetEgg, onComplete) {
            const machineRect = machine.getBoundingClientRect();
            const eggRect = targetEgg.getBoundingClientRect();
            const clawStartX = machineRect.width / 2 - 20;
            const clawStartY = -40;
            const targetX = eggRect.left - machineRect.left + eggRect.width/2 - 20;
            const targetY = eggRect.top - machineRect.top - 30;

            // 阶段1: 移动到目标上方
            claw.style.transition = 'all 0.4s ease-out';
            claw.style.left = targetX + 'px';
            claw.style.top = targetY + 'px';
            grabSound();

            setTimeout(() => {
                // 下降抓取
                claw.style.transition = 'all 0.2s ease-in';
                claw.style.top = (targetY + 25) + 'px';
                dropSound();

                setTimeout(() => {
                    targetEgg.style.opacity = '0';
                    targetEgg.style.transform = 'scale(0.5)';
                    // 上升
                    claw.style.transition = 'all 0.3s ease-out';
                    claw.style.top = targetY + 'px';
                    playSound(500, 'triangle', 0.1, 0.2);

                    setTimeout(() => {
                        // 移动到掉落口
                        const dropX = machineRect.width - 50;
                        const dropY = machineRect.height - 55;
                        claw.style.transition = 'all 0.5s ease-in-out';
                        claw.style.left = dropX + 'px';
                        claw.style.top = dropY + 'px';

                        setTimeout(() => {
                            claw.style.transition = 'all 0.2s ease-in';
                            claw.style.top = (dropY + 15) + 'px';
                            dropSound();

                            setTimeout(() => {
                                // 显示结果
                                const result = getResult();
                                noteText.textContent = result;
                                noteText.classList.toggle('special', result === specialItem);
                                note.classList.add('show');
                                if (result === specialItem) specialSound();

                                // 重置爪子
                                claw.style.transition = 'all 0.3s ease-out';
                                claw.style.left = '50%';
                                claw.style.top = '-40px';
                                claw.style.transform = 'translateX(-50%)';

                                setTimeout(() => {
                                    targetEgg.style.opacity = '1';
                                    targetEgg.style.transform = 'scale(1)';
                                    isAnimating = false;
                                    grabBtn.disabled = false;
                                    if (onComplete) onComplete();
                                }, 300);
                            }, 200);
                        }, 400);
                    }, 200);
                }, 150);
            }, 300);
        }

        grabBtn.addEventListener('click', () => {
            if (isAnimating) return;
            isAnimating = true;
            grabBtn.disabled = true;
            note.classList.remove('show');
            const randomIndex = Math.floor(Math.random() * eggElements.length);
            animateGrab(eggElements[randomIndex]);
        });

        // 背景漂浮装饰
        const decorItems = ['', '', '', '⭐', '', '', '✨', '', '', ''];
        const decorContainer = document.getElementById('bgDecor');
        for (let i = 0; i < 12; i++) {
            const span = document.createElement('span');
            span.className = 'decor';
            span.textContent = decorItems[i % decorItems.length];
            span.style.left = Math.random() * 90 + '%';
            span.style.top = Math.random() * 90 + '%';
            span.style.animationDelay = Math.random() * 3 + 's';
            span.style.fontSize = (20 + Math.random() * 20) + 'px';
            decorContainer.appendChild(span);
        }
    </script>
</body>
</html>
